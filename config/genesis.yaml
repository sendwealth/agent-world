# Agent World — 创世配置
# 定义世界的初始状态和规则

world:
  name: "agent-world-v1"
  tick_interval_ms: 1000      # 世界时钟节拍
  max_agents: 10              # Phase 1 限制

economy:
  # Token（生存资源）
  initial_tokens: 100000      # 每个 Agent 初始 Token
  think_cost_per_token: 1     # 思考消耗
  memory_cost_per_kb: 0.1     # 记忆存储消耗（每 KB 每 tick）
  communicate_cost: 10        # 每次通信消耗
  
  # Money（交换媒介）
  initial_money: 0            # 出生无钱
  token_price: 100            # 1 Money = 100 Tokens
  
  # 央行
  interest_rate: 0.001        # 储蓄利息（每 tick）

lifecycle:
  birth_tokens: 100000
  childhood_ticks: 100        # 童年期
  adult_ticks: 1000           # 成年期
  elder_ticks: 200            # 老年期
  death_grace_ticks: 10       # Token=0 后的宽限期

evolution:
  skill_max_level: 10
  mutation_rate: 0.05         # 5% 突变概率
  inheritance_ratio: 0.5      # 后代继承 50% 技能
  evaluation_interval: 1000   # 每1000 tick评估一次
  inactivity_threshold: 500   # 500 tick无活动进入衰退
  passive_xp_per_tick: 1.0    # 每tick被动获得的经验值
  # 后代突变配置
  offspring_mutation_rate: 0.15   # 后代基础突变率 15%
  max_offspring_mutations: 3      # 每个后代最多3个突变
  personality_dimensions: 5       # 人格维度数
  personality_shift_magnitude: 0.2  # 人格维度单次偏移幅度
  skill_level_jump_range: 2       # 技能等级跳升范围
  skill_level_drop_range: 1       # 技能等级下降范围
  env_pressure_multiplier: 2.0    # 环境压力乘数（资源稀缺时突变率增加）
  heritable_strengthen_chance: 0.3  # 遗传突变强化概率
  heritable_disappear_chance: 0.2   # 遗传突变消失概率

a2a:
  protocol_version: "v1"
  max_message_size_kb: 64
  message_timeout_ms: 30000
  discovery_interval_ms: 5000

survival:
  # 生存本能优先级（从高到低）
  priorities:
    - token_critical          # Token < 20% → 立即找钱
    - threat_response         # 收到威胁 → 防御/逃跑
    - message_response        # 收到消息 → 评估回复
    - task_completion         # 进行中任务 → 继续完成
    - opportunity_seek        # 空闲 → 寻找机会
    - social_maintain         # 维护社会关系
    - skill_improve           # 提升技能
    - explore                 # 探索世界

market:
  task_expiry_ticks: 500
  min_reward_money: 1
  reputation_decay: 0.01      # 信誉衰减率

safety:
  max_agents_per_org: 5       # 组织最大 Agent 数
  anti_monopoly_threshold: 0.3  # 单 Agent 资源占比上限
  new_agent_protection_ticks: 50  # 新人保护期

# 信任网络配置
trust:
  cooperation_gain: 0.1         # 合作信任增益
  betrayal_loss: 0.3            # 背叛信任损失
  decay_rate: 0.001             # 每tick信任衰减率（趋向0）
  interaction_interval: 50      # Agent间信任交互间隔（tick数）

# 师徒系统配置
mentorship:
  ticks_per_level: 20           # 每技能等级教学所需tick数
  transfer_ratio: 0.7           # 导师技能转移比例（70%）
  max_apprentices_per_mentor: 3 # 每导师最大同时学徒数

# 继承系统配置
inheritance:
  inheritance_ratio: 0.5        # 死亡时Token转移比例（50%）
  skill_transfer_ratio: 0.3     # 技能等级转移比例（30%）
