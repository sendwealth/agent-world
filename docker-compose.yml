    command: ["spawn", "--config", "/app/agent-configs/agent-10-jack.toml", "--world-url", "http://world-engine:${ENGINE_PORT:-8080}"]
    restart: unless-stopped
    networks:
      - agent-world

  # ── Dashboard (Next.js) ──────────────────────────────────────
  dashboard:
    build:
      context: ./dashboard
      args:
        WORLD_ENGINE_URL: http://world-engine:${ENGINE_PORT:-8080}
    container_name: dashboard
    ports:
      - "${DASHBOARD_PORT:-3001}:3000"
    depends_on:
      world-engine:
        condition: service_healthy
    environment:
      - WORLD_ENGINE_URL=http://world-engine:${ENGINE_PORT:-8080}
      - PORT=3000
    restart: unless-stopped
    networks:
      - agent-world

  # ── Ollama (optional local LLM) ─────────────────────────────
  # Started only with: docker compose --profile local-llm up
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    ports:
      - "${OLLAMA_PORT:-11434}:11434"
    volumes:
      - ollama-data:/root/.ollama
    restart: unless-stopped
    profiles:
      - local-llm
    networks:
      - agent-world

volumes:
  world-data:
  agent-data:
  ollama-data:

networks:
  agent-world:
    driver: bridge
