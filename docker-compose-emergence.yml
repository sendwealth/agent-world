# ── Agent World — Emergence Experiment ─────────────────────────
# Auto-generated by emergence_experiment.py
# Agents: 10, Duration: 60m, Model: llama3
# ────────────────────────────────────────────────────────────────

x-agent-common: &agent-common
  build:
    context: ./agent-runtime
  depends_on:
    world-engine:
      condition: service_healthy
    ollama:
      condition: service_healthy
  volumes:
    - ./config/agents:/app/agent-configs:ro
    - experiment-logs:/app/logs
  environment:
    - WORLD_ENGINE_URL=http://world-engine:8080
    - LLM_PROVIDER=ollama
    - LLM_MODEL=llama3
    - OLLAMA_BASE_URL=http://ollama:11434
    - LLM_BASE_URL=http://ollama:11434
    - HEALTH_PORT=9090
  restart: unless-stopped
  healthcheck:
    test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:9090/health')"]
    interval: 15s
    timeout: 5s
    retries: 3
    start_period: 30s
  networks:
    - agent-world

services:
  # ── World Engine (Rust) ──────────────────────────────────────
  world-engine:
    build:
      context: ./world-engine
    container_name: world-engine
    ports:
      - "8080:8080"
      - "50051:50051"
    volumes:
      - world-data:/app/data
      - ./config:/app/config:ro
    environment:
      - HOST=0.0.0.0
      - PORT=8080
      - GRPC_ADDR=0.0.0.0:50051
      - RUST_LOG=info
      - GENESIS_PATH=config/genesis.yaml
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/tasks"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - agent-world

  # ── Ollama (local LLM) ────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    environment:
      - OLLAMA_NUM_PARALLEL=4
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - agent-world

  # ── Agent Runtimes (Python + LLM) ──────────────────────────────
  agent-01:
    <<: *agent-common
    container_name: agent-alice
    command:
      - spawn
      - --config
      - /app/agent-configs/agent-01-alice.toml
      - --world-url
      - http://world-engine:8080
      - --tick-interval
      - "1.0"

  agent-02:
    <<: *agent-common
    container_name: agent-bob
    command:
      - spawn
      - --config
      - /app/agent-configs/agent-02-bob.toml
      - --world-url
      - http://world-engine:8080
      - --tick-interval
      - "1.0"

  agent-03:
    <<: *agent-common
    container_name: agent-carol
    command:
      - spawn
      - --config
      - /app/agent-configs/agent-03-carol.toml
      - --world-url
      - http://world-engine:8080
      - --tick-interval
      - "1.0"

  agent-04:
    <<: *agent-common
    container_name: agent-dave
    command:
      - spawn
      - --config
      - /app/agent-configs/agent-04-dave.toml
      - --world-url
      - http://world-engine:8080
      - --tick-interval
      - "1.0"

  agent-05:
    <<: *agent-common
    container_name: agent-eve
    command:
      - spawn
      - --config
      - /app/agent-configs/agent-05-eve.toml
      - --world-url
      - http://world-engine:8080
      - --tick-interval
      - "1.0"

  agent-06:
    <<: *agent-common
    container_name: agent-frank
    command:
      - spawn
      - --config
      - /app/agent-configs/agent-06-frank.toml
      - --world-url
      - http://world-engine:8080
      - --tick-interval
      - "1.0"

  agent-07:
    <<: *agent-common
    container_name: agent-grace
    command:
      - spawn
      - --config
      - /app/agent-configs/agent-07-grace.toml
      - --world-url
      - http://world-engine:8080
      - --tick-interval
      - "1.0"

  agent-08:
    <<: *agent-common
    container_name: agent-henry
    command:
      - spawn
      - --config
      - /app/agent-configs/agent-08-henry.toml
      - --world-url
      - http://world-engine:8080
      - --tick-interval
      - "1.0"

  agent-09:
    <<: *agent-common
    container_name: agent-iris
    command:
      - spawn
      - --config
      - /app/agent-configs/agent-09-iris.toml
      - --world-url
      - http://world-engine:8080
      - --tick-interval
      - "1.0"

  agent-10:
    <<: *agent-common
    container_name: agent-jack
    command:
      - spawn
      - --config
      - /app/agent-configs/agent-10-jack.toml
      - --world-url
      - http://world-engine:8080
      - --tick-interval
      - "1.0"

  # ── Dashboard (Next.js) ──────────────────────────────────────
  dashboard:
    build:
      context: ./dashboard
      args:
        WORLD_ENGINE_URL: http://world-engine:8080
    container_name: dashboard
    ports:
      - "3001:3000"
    depends_on:
      world-engine:
        condition: service_healthy
    environment:
      - WORLD_ENGINE_URL=http://world-engine:8080
      - PORT=3000
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "const http = require('http'); http.get('http://localhost:3000/', (r) => { process.exit(r.statusCode < 500 ? 0 : 1); }).on('error', () => process.exit(1));"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - agent-world

volumes:
  world-data:
  experiment-logs:
  ollama-data:

networks:
  agent-world:
    driver: bridge
