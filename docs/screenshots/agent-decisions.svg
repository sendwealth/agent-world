<svg xmlns="http://www.w3.org/2000/svg" width="640" height="360" viewBox="0 0 640 360">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
  </defs>
  <rect width="640" height="360" fill="url(#bg)" rx="8"/>
  <!-- Header -->
  <text x="320" y="36" text-anchor="middle" fill="#e2e8f0" font-family="system-ui, sans-serif" font-size="18" font-weight="600">🤖 Agent Decision Log — Agent #7 "Atlas"</text>
  <line x1="40" y1="52" x2="600" y2="52" stroke="#334155" stroke-width="1"/>
  <!-- Agent Stats -->
  <rect x="40" y="64" width="560" height="48" rx="6" fill="#1e293b" stroke="#475569" stroke-width="1"/>
  <text x="60" y="84" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="11">Age: Adult</text>
  <text x="170" y="84" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="11">Balance: 2,340₵</text>
  <text x="320" y="84" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="11">Tokens: 1,200</text>
  <text x="460" y="84" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="11">Guild: Builders</text>
  <text x="60" y="102" fill="#4ade80" font-family="system-ui, sans-serif" font-size="11">Skills: Mining Lv.4 ▓▓▓▓░ Crafting Lv.3 ▓▓▓░░ Trading Lv.5 ▓▓▓▓▓</text>
  <!-- Think Loop -->
  <rect x="40" y="124" width="560" height="30" rx="4" fill="#0f172a" stroke="#22d3ee" stroke-width="1"/>
  <text x="320" y="144" text-anchor="middle" fill="#22d3ee" font-family="system-ui, sans-serif" font-size="12" font-weight="600">Think Loop: Perceive → Decide → Act</text>
  <!-- Perceive -->
  <rect x="40" y="164" width="175" height="80" rx="6" fill="#0f172a" stroke="#4ade80" stroke-width="1"/>
  <text x="128" y="182" text-anchor="middle" fill="#4ade80" font-family="system-ui, sans-serif" font-size="11" font-weight="600">👁 Perceive</text>
  <text x="52" y="200" fill="#94a3b8" font-family="monospace" font-size="10">Inventory: 12 wood, 3 stone</text>
  <text x="52" y="216" fill="#94a3b8" font-family="monospace" font-size="10">Market: wood=5₵, stone=8₵</text>
  <text x="52" y="232" fill="#94a3b8" font-family="monospace" font-size="10">Threat: famine in 5 ticks</text>
  <!-- Decide -->
  <rect x="233" y="164" width="175" height="80" rx="6" fill="#0f172a" stroke="#fbbf24" stroke-width="1"/>
  <text x="320" y="182" text-anchor="middle" fill="#fbbf24" font-family="system-ui, sans-serif" font-size="11" font-weight="600">🧠 Decide</text>
  <text x="245" y="200" fill="#94a3b8" font-family="monospace" font-size="10">Strategy: stockpile food</text>
  <text x="245" y="216" fill="#94a3b8" font-family="monospace" font-size="10">Priority: survival</text>
  <text x="245" y="232" fill="#94a3b8" font-family="monospace" font-size="10">Budget: 50₵ max</text>
  <!-- Act -->
  <rect x="425" y="164" width="175" height="80" rx="6" fill="#0f172a" stroke="#a78bfa" stroke-width="1"/>
  <text x="512" y="182" text-anchor="middle" fill="#a78bfa" font-family="system-ui, sans-serif" font-size="11" font-weight="600">⚡ Act</text>
  <text x="437" y="200" fill="#94a3b8" font-family="monospace" font-size="10">→ Buy food x10 (40₵)</text>
  <text x="437" y="216" fill="#94a3b8" font-family="monospace" font-size="10">→ Propose trade to #31</text>
  <text x="437" y="232" fill="#94a3b8" font-family="monospace" font-size="10">→ Join Guild "Farmers"</text>
  <!-- Decision History -->
  <rect x="40" y="256" width="560" height="80" rx="6" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <text x="320" y="276" text-anchor="middle" fill="#e2e8f0" font-family="system-ui, sans-serif" font-size="12" font-weight="600">Recent Decisions</text>
  <text x="56" y="296" fill="#64748b" font-family="monospace" font-size="10">Tick 3240: GATHER wood → success +5</text>
  <text x="56" y="310" fill="#64748b" font-family="monospace" font-size="10">Tick 3239: TRADE wood→food w/ #42 → success</text>
  <text x="56" y="324" fill="#64748b" font-family="monospace" font-size="10">Tick 3238: RESEARCH crafting Lv.3 → unlocked</text>
  <!-- Watermark -->
  <text x="320" y="350" text-anchor="middle" fill="#475569" font-family="system-ui, sans-serif" font-size="10" font-style="italic">📸 Screenshot placeholder — replace with real capture from localhost:3001/agents/[id]</text>
</svg>
