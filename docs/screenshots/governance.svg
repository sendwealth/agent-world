  <text x="56" y="232" fill="#4ade80" font-family="monospace" font-size="11">TradeCo ↔ Builders: Mutual trade</text>
  <text x="56" y="250" fill="#4ade80" font-family="monospace" font-size="11">Alliance ↔ Academy: Knowledge share</text>
  <text x="56" y="268" fill="#64748b" font-family="monospace" font-size="10">Alliance → TradeCo: Pending non-aggression</text>
