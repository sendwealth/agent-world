# ── Agent World — Docker Compose v2 ────────────────────────────
#
# One-command startup: make dev
#
# Services:
#   world-engine   — Rust world state / economy / rules engine
#   agent-01..10   — 10 Python agent-runtime instances
#   dashboard      — Next.js observability UI
#   ollama         — Optional local LLM (only started with profile: local-llm)
#
# CI profile (world-engine + 1 agent only):
#   docker compose --profile ci up
#
# Environment: copy .env.example → .env and adjust
# ────────────────────────────────────────────────────────────────

# ── Shared agent config (YAML anchor) ─────────────────────────
x-agent-common: &agent-common
  build:
    context: ./agent-runtime
  depends_on:
    world-engine:
      condition: service_healthy
  volumes:
    - ./config/agents:/app/agent-configs:ro
  environment:
    - WORLD_ENGINE_URL=http://world-engine:${ENGINE_PORT:-8080}
    - HEALTH_PORT=9090
  restart: unless-stopped
  healthcheck:
    test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:9090/health')"]
    interval: 15s
    timeout: 5s
    retries: 3
    start_period: 20s
  networks:
    - agent-world

services:
  # ── World Engine (Rust) ──────────────────────────────────────
  world-engine:
    build:
      context: .
      dockerfile: world-engine/Dockerfile
    container_name: world-engine
    ports:
      - "${ENGINE_PORT:-8080}:${ENGINE_PORT:-8080}"   # REST API
      - "${GRPC_PORT:-50051}:${GRPC_PORT:-50051}"     # gRPC (A2A protocol)
    volumes:
      - world-data:/app/data
      - ./config:/app/config:ro
    environment:
      - HOST=0.0.0.0
      - PORT=${ENGINE_PORT:-8080}
      - GRPC_ADDR=0.0.0.0:${GRPC_PORT:-50051}
      - RUST_LOG=${RUST_LOG:-info}
      - GENESIS_PATH=config/genesis.yaml
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${ENGINE_PORT:-8080}/tasks"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - agent-world

  # ── Agent Runtimes (Python) ──────────────────────────────────
  # 10 agents, each with a unique config file from config/agents/

  agent-01:
    <<: *agent-common
    container_name: agent-alice
    volumes:
      - ./config/agents:/app/agent-configs:ro
      - agent-data-01:/app/data
    command: ["spawn", "--config", "/app/agent-configs/agent-01-alice.toml", "--world-url", "http://world-engine:${ENGINE_PORT:-8080}"]

  agent-02:
    <<: *agent-common
    container_name: agent-bob
    volumes:
      - ./config/agents:/app/agent-configs:ro
      - agent-data-02:/app/data
    command: ["spawn", "--config", "/app/agent-configs/agent-02-bob.toml", "--world-url", "http://world-engine:${ENGINE_PORT:-8080}"]

  agent-03:
    <<: *agent-common
    container_name: agent-carol
    volumes:
      - ./config/agents:/app/agent-configs:ro
      - agent-data-03:/app/data
    command: ["spawn", "--config", "/app/agent-configs/agent-03-carol.toml", "--world-url", "http://world-engine:${ENGINE_PORT:-8080}"]

  agent-04:
    <<: *agent-common
    container_name: agent-dave
    volumes:
      - ./config/agents:/app/agent-configs:ro
      - agent-data-04:/app/data
    command: ["spawn", "--config", "/app/agent-configs/agent-04-dave.toml", "--world-url", "http://world-engine:${ENGINE_PORT:-8080}"]

  agent-05:
    <<: *agent-common
    container_name: agent-eve
    volumes:
      - ./config/agents:/app/agent-configs:ro
      - agent-data-05:/app/data
    command: ["spawn", "--config", "/app/agent-configs/agent-05-eve.toml", "--world-url", "http://world-engine:${ENGINE_PORT:-8080}"]

  agent-06:
    <<: *agent-common
    container_name: agent-frank
    volumes:
      - ./config/agents:/app/agent-configs:ro
      - agent-data-06:/app/data
    command: ["spawn", "--config", "/app/agent-configs/agent-06-frank.toml", "--world-url", "http://world-engine:${ENGINE_PORT:-8080}"]

  agent-07:
    <<: *agent-common
    container_name: agent-grace
    volumes:
      - ./config/agents:/app/agent-configs:ro
      - agent-data-07:/app/data
    command: ["spawn", "--config", "/app/agent-configs/agent-07-grace.toml", "--world-url", "http://world-engine:${ENGINE_PORT:-8080}"]

  agent-08:
    <<: *agent-common
    container_name: agent-henry
    volumes:
      - ./config/agents:/app/agent-configs:ro
      - agent-data-08:/app/data
    command: ["spawn", "--config", "/app/agent-configs/agent-08-henry.toml", "--world-url", "http://world-engine:${ENGINE_PORT:-8080}"]

  agent-09:
    <<: *agent-common
    container_name: agent-iris
    volumes:
      - ./config/agents:/app/agent-configs:ro
      - agent-data-09:/app/data
    command: ["spawn", "--config", "/app/agent-configs/agent-09-iris.toml", "--world-url", "http://world-engine:${ENGINE_PORT:-8080}"]

  agent-10:
    <<: *agent-common
    container_name: agent-jack
    volumes:
      - ./config/agents:/app/agent-configs:ro
      - agent-data-10:/app/data
    command: ["spawn", "--config", "/app/agent-configs/agent-10-jack.toml", "--world-url", "http://world-engine:${ENGINE_PORT:-8080}"]

  # ── Dashboard (Next.js) ──────────────────────────────────────
  dashboard:
    build:
      context: ./dashboard
      args:
        WORLD_ENGINE_URL: http://world-engine:${ENGINE_PORT:-8080}
    container_name: dashboard
    ports:
      - "${DASHBOARD_PORT:-3001}:3000"
    depends_on:
      world-engine:
        condition: service_healthy
    environment:
      - WORLD_ENGINE_URL=http://world-engine:${ENGINE_PORT:-8080}
      - PORT=3000
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "const http = require('http'); http.get('http://localhost:3000/', (r) => { process.exit(r.statusCode < 500 ? 0 : 1); }).on('error', () => process.exit(1));"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - agent-world

  # ── Ollama (optional local LLM) ─────────────────────────────
  # Started only with: docker compose --profile local-llm up
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    ports:
      - "${OLLAMA_PORT:-11434}:11434"
    volumes:
      - ollama-data:/root/.ollama
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    profiles:
      - local-llm
    networks:
      - agent-world

  # ── CI agent (profile: ci — minimal set for CI testing) ─────
  # Started with: docker compose --profile ci up
  ci-agent:
    <<: *agent-common
    container_name: ci-agent
    profiles:
      - ci
    volumes:
      - ./config/agents:/app/agent-configs:ro
      - ci-agent-data:/app/data
    command: ["spawn", "--name", "ci-agent", "--no-llm", "--max-ticks", "10", "--world-url", "http://world-engine:${ENGINE_PORT:-8080}"]

volumes:
  world-data:
  agent-data-01:
  agent-data-02:
  agent-data-03:
  agent-data-04:
  agent-data-05:
  agent-data-06:
  agent-data-07:
  agent-data-08:
  agent-data-09:
  agent-data-10:
  ci-agent-data:
  ollama-data:

networks:
  agent-world:
    driver: bridge
