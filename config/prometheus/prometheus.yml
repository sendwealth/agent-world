global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s

scrape_configs:
  # ── World Engine (Rust) ────────────────────────────────
  - job_name: "world-engine"
    metrics_path: "/metrics"
    static_configs:
      - targets: ["world-engine:8080"]
        labels:
          service: "world-engine"
          language: "rust"

  # ── Agent Runtimes (Python) ────────────────────────────
  # Each agent exposes /metrics on its HEALTH_PORT (9090)
  - job_name: "agent-runtimes"
    metrics_path: "/metrics"
    static_configs:
      - targets:
          - "agent-alice:9090"
          - "agent-bob:9090"
          - "agent-carol:9090"
          - "agent-dave:9090"
          - "agent-eve:9090"
          - "agent-frank:9090"
          - "agent-grace:9090"
          - "agent-henry:9090"
          - "agent-iris:9090"
          - "agent-jack:9090"
        labels:
          service: "agent-runtime"
          language: "python"
