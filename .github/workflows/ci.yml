name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  PYTHON_VERSION: "3.11"

jobs:
  # ── Rust ─────────────────────────────────────────────────
  rust:
    name: Rust – clippy + test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: world-engine
    steps:
      - uses: actions/checkout@v5

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
          sudo apt-get clean
          df -h /

      - name: Install Protoc
        run: |
          set -euo pipefail
          PROTOC_VERSION="25.6"
          ARCH=$(uname -m)
          case "$ARCH" in
            x86_64)  PB_ARCH="x86_64" ;;
            aarch64) PB_ARCH="aarch_64" ;;
            *) echo "Unsupported arch: $ARCH"; exit 1 ;;
          esac
          PB="protoc-${PROTOC_VERSION}-linux-${PB_ARCH}.zip"
          curl -fsSL -o "/tmp/${PB}" "https://github.com/protocolbuffers/protobuf/releases/download/v${PROTOC_VERSION}/${PB}"
          sudo unzip -o "/tmp/${PB}" -d /usr/local
          sudo chmod +x /usr/local/bin/protoc
          protoc --version

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache Cargo artifacts
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            world-engine/target/
          key: rust-${{ runner.os }}-cargo-${{ hashFiles('world-engine/Cargo.lock') }}
          restore-keys: rust-${{ runner.os }}-cargo-

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Unit tests
        run: cargo test --lib

      - name: Integration tests
        run: cargo test

  # ── Python ───────────────────────────────────────────────
  python:
    name: Python – ruff + pytest
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: agent-runtime
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip
        uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: python-${{ runner.os }}-pip-${{ hashFiles('agent-runtime/requirements-lock.txt') }}
          restore-keys: python-${{ runner.os }}-pip-

      - name: Install pinned dependencies
        run: pip install -r requirements-lock.txt

      - name: Install editable package (no-op if versions already pinned)
        run: pip install -e .

      - name: Ruff check
        run: ruff check .

      - name: Mypy type check
        run: mypy agent_runtime/

      - name: Pytest
        run: pytest -v

  # ── Dashboard ────────────────────────────────────────────
  dashboard:
    name: Dashboard – lint + type-check + build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dashboard
    steps:
      - uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: dashboard/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint (ESLint)
        run: npm run lint

      - name: Type-check (tsc)
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

  # ── Docker ───────────────────────────────────────────────
  docker:
    name: Docker – build check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Build world-engine image
        run: docker build -t ci-check:world-engine -f world-engine/Dockerfile .

      - name: Build agent-runtime image
        run: docker build -t ci-check:agent-runtime ./agent-runtime

      - name: Build dashboard image
        run: docker build -t ci-check:dashboard ./dashboard
