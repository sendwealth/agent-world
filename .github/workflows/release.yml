name: Release

on:
  push:
    tags: ["v*"]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  packages: write

env:
  CARGO_TERM_COLOR: always
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ── Build cross-compiled binaries ────────────────────────
  build-binaries:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: agent-world-engine-linux-amd64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: agent-world-engine-linux-arm64
          - target: x86_64-apple-darwin
            os: macos-latest
            artifact: agent-world-engine-macos-amd64
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact: agent-world-engine-macos-arm64
    defaults:
      run:
        working-directory: world-engine
    steps:
      - uses: actions/checkout@v5

      - name: Install Protoc
        shell: bash
        run: |
          set -euo pipefail
          PROTOC_VERSION="25.6"
          OS="$(uname -s)"
          ARCH="$(uname -m)"
          case "$OS" in
            Linux)  PB_OS="linux" ;;
            Darwin) PB_OS="osx"   ;;
            *) echo "Unsupported OS: $OS"; exit 1 ;;
          esac
          case "$ARCH" in
            x86_64)  PB_ARCH="x86_64" ;;
            aarch64|arm64) PB_ARCH="aarch_64" ;;
            *) echo "Unsupported arch: $ARCH"; exit 1 ;;
          esac
          PB="protoc-${PROTOC_VERSION}-${PB_OS}-${PB_ARCH}.zip"
          curl -fsSL -o "/tmp/${PB}" "https://github.com/protocolbuffers/protobuf/releases/download/v${PROTOC_VERSION}/${PB}"
          sudo unzip -o "/tmp/${PB}" -d /usr/local
          sudo chmod +x /usr/local/bin/protoc
          protoc --version

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
        shell: bash

      - name: Cache Cargo artifacts
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            world-engine/target/
          key: release-${{ matrix.target }}-cargo-${{ hashFiles('world-engine/Cargo.lock') }}
          restore-keys: release-${{ matrix.target }}-cargo-

      - name: Build binary
        run: cargo build --release --locked --target ${{ matrix.target }}
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc

      - name: Prepare artifact
        run: |
          mkdir -p /tmp/release
          cp target/${{ matrix.target }}/release/agent-world-engine /tmp/release/${{ matrix.artifact }}
          chmod +x /tmp/release/${{ matrix.artifact }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: /tmp/release/${{ matrix.artifact }}
          if-no-files-found: error

  # ── Build & push Docker images ───────────────────────────
  docker:
    name: Docker – build & push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha
            type=raw,value=latest

      - name: Build and push world-engine image
        uses: docker/build-push-action@v5
        with:
          context: ./world-engine
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/world-engine:${{ steps.meta.outputs.version }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Build and push agent-runtime image
        uses: docker/build-push-action@v5
        with:
          context: ./agent-runtime
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/agent-runtime:${{ steps.meta.outputs.version }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Build and push dashboard image
        uses: docker/build-push-action@v5
        with:
          context: ./dashboard
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/dashboard:${{ steps.meta.outputs.version }}
          labels: ${{ steps.meta.outputs.labels }}

  # ── Create GitHub Release ────────────────────────────────
  release:
    name: Create GitHub Release
    needs: [build-binaries, docker]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: /tmp/artifacts
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd /tmp/artifacts
          sha256sum * > checksums-sha256.txt
          ls -la

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: Generate release body
        id: body
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ steps.version.outputs.VERSION }}"
          RELEASE_DATE="$(date -u +%Y-%m-%d)"

          # Try to extract the changelog section for this version
          # Matches: ## [VERSION] - DATE ... up to the next ## [ or end of file
          # Trims leading blank lines for clean formatting
          CHANGELOG_SECTION="$(awk -v ver="${VERSION}" '
            index($0, "## [" ver "] ") == 1 { found=1; next }
            /^## \[/ && found { exit }
            found && started == 0 && NF == 0 { next }
            found { started=1; print }
          ' CHANGELOG.md)"

          # Build the dynamic release body
          {
            echo "## Agent World v${VERSION} — ${RELEASE_DATE}"
            echo ""
            if [ -n "${CHANGELOG_SECTION}" ]; then
              echo "${CHANGELOG_SECTION}"
            else
              echo "No changelog entry found for v${VERSION}. See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) for full details."
            fi
            echo ""
            echo "---"
            echo ""
            echo "**Full Changelog**: https://github.com/${{ github.repository }}/compare/$(git describe --tags --abbrev=0 HEAD~1 2>/dev/null || echo HEAD)...v${VERSION}"
          } > /tmp/release_body.md

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          name: Release v${{ steps.version.outputs.VERSION }}
          body_path: /tmp/release_body.md
          draft: false
          prerelease: ${{ contains(steps.version.outputs.VERSION, '-') }}
          files: |
            /tmp/artifacts/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
